<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>500 - System Error 🐾</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: white; height: 100vh; display: flex; align-items: center; text-align: center; }
        .error-container { max-width: 500px; margin: auto; padding: 2rem; border: 1px solid #f39c12; border-radius: 20px; }
        .accent { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="display-1 accent">500</h1>
        <h3>System Hiccup</h3>
        <p class="opacity-75">Something went wrong on our end. Don't worry, your data is safe. Please try again in a few minutes.</p>
        <a href="/" class="btn btn-outline-light mt-3">Try Again</a>
    </div>
</body>
</html>

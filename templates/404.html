<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found 🐾</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: white; height: 100vh; display: flex; align-items: center; text-align: center; }
        .error-container { max-width: 500px; margin: auto; padding: 2rem; border: 1px solid #ff85a1; border-radius: 20px; }
        .accent { color: #ff85a1; font-weight: bold; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="display-1 accent">404</h1>
        <h3>Oops! Page Not Found</h3>
        <p class="opacity-75">The memory you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn btn-outline-light mt-3">Back to Safety</a>
    </div>
</body>
</html>

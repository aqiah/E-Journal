<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Memory // Luxe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: white; padding-top: 50px; font-family: sans-serif; }
        .edit-container { background: rgba(15, 23, 42, 0.9); padding: 3rem; border-radius: 25px; border: 2px solid #ff85a1; max-width: 600px; margin: auto; }
        .form-control {
    background-color: #ffffff !important;
    color: #000000 !important;
    font-weight: 600;
    border: 2px solid #ff85a1;
}
        .btn-luxe { background: #ff85a1; color: white; border: none; width: 100%; padding: 10px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2 class="mb-4 text-center">Update Memory ✨</h2>
        <form method="POST">
            <label class="small opacity-75">TITLE</label>
            <input type="text" name="title" class="form-control" value="{{ entry.title }}" required>
            
            <label class="small opacity-75">CONTENT</label>
            <textarea name="content" class="form-control" rows="5" required>{{ entry.content }}</textarea>
            
            <button type="submit" class="btn btn-luxe">Save Changes</button>
            <a href="/" class="d-block text-center mt-3 text-secondary" style="text-decoration:none;">Cancel</a>
        </form>
    </div>
</body>
</html>
